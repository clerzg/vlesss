name: Build and Release Sing-box Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Latest Stable Tag
        id: get_tag
        run: |
          # 全自动获取官方最新稳定版 Tag
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "[DEBUG] 监测到官方最新稳定版本为: $LATEST_TAG"

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ steps.get_tag.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Optimize
        run: |
          cd cmd/sing-box
          # CGO_ENABLED=0 纯静态编译，极大提升在小系统上的兼容性
          # -tags "with_vless,with_tcp" 彻底杜绝不要的协议
          # -s -w -trimpath 抹除所有符号和调试信息，让硬盘体积也尽可能小
          CGO_ENABLED=0 go build -v \
            -tags "with_vless,with_tcp" \
            -trimpath \
            -ldflags "-s -w -buildid=" \
            -o ../../sing-box

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: sing-box
          draft: false
          prerelease: false
          body: |
            ## Sing-box 纯原生低内存优化版
            
            - **同步官方版本**: `${{ steps.get_tag.outputs.tag }}`
            - **协议裁剪**: 仅保留 `VLESS` + `TCP` 核心
            - **内存优化**: **无 UPX 压缩**，完美触发 Linux 按需加载机制，常驻内存仅 ~9MB，极其适合 64MB 小内存 VPS 运行。