name: Build and Release Sing-box Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      max-parallel: 1
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Get Latest Stable Tag
        id: get_tag
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ steps.get_tag.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build and Optimize
        run: |
          cd cmd/sing-box
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -v \
            -tags "with_vless,with_tcp" \
            -trimpath \
            -ldflags "-s -w -buildid=" \
            -o ../../sing-box
          cd ../../
          strip --strip-all sing-box

      - name: Pack and XZ Minimal
        run: |
          tar -cJf sing-box-linux-${{ matrix.goarch }}.tar.xz sing-box

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: sing-box-linux-${{ matrix.goarch }}.tar.xz
          draft: false
          prerelease: false
          body: |
            - **同步官方版本**: `${{ steps.get_tag.outputs.tag }}`
            - **协议裁剪**: 仅保留 `VLESS` + `TCP`