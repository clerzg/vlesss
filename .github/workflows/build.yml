name: Build and Release Sing-box Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Official Source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: v1.13.13

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Hardcore Minimal
        run: |
          # 1. 进到官方的主程序入口目录
          cd cmd/sing-box
          
          # 2. 核心魔法：利用 Go 官方支持的 tags 结合 ldflags 进行极致空间和内存剪裁
          # -tags "with_vless,with_tcp" 告诉编译器只激活 VLESS 协议和 TCP 传输层
          # -s -w 剔除所有符号表与调试调试信息
          # -trimpath 隐藏所有本地编译路径，减少冗余字符
          CGO_ENABLED=0 go build -v \
            -tags "with_vless,with_tcp" \
            -trimpath \
            -ldflags "-s -w -buildid=" \
            -o ../../sing-box

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.13.13
          files: sing-box
          draft: false
          prerelease: false
          body: "Hardcore surgical minimal build: VLESS + TCP + HTTP only. 100% stable dependency chain."