name: Build and Release Sing-box Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: v1.13.13

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Create Minimal Main
        run: |
          cat <<EOF > minimal-main.go
          package main
          import (
              "github.com/sagernet/sing-box/common/x"
              _ "github.com/sagernet/sing-box/inbound/vless"
              _ "github.com/sagernet/sing-box/transport/tcp"
              _ "github.com/sagernet/sing-box/transport/internet/http"
          )
          func main() {
              x.Run()
          }
          EOF

      - name: Build Hardcore Minimal
        run: |
          go mod tidy
          # -s -w 去除调试信息；-trimpath 移除路径信息；CGO_ENABLED=0 强制静态编译
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -buildid=" -o sing-box .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.13.13
          files: sing-box
          draft: false
          prerelease: false
          body: "Hardcore minimal build: VLESS + TCP + HTTP Transport only. No debug symbols, statically linked."