name: Build and Release Sing-box Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Latest Stable Tag
        id: get_tag
        run: |
          # 自动获取官方最新的稳定版 Release Tag（排除掉 rc 等预览版）
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "[DEBUG] 监测到官方最新稳定版本为: $LATEST_TAG"

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ steps.get_tag.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Optimize
        run: |
          cd cmd/sing-box
          # 使用原生 Tags 裁剪核心，彻底丢掉无用协议代码
          # -s -w -trimpath 最大化压榨二进制体积，完美适配 64MB 内存
          CGO_ENABLED=0 go build -v \
            -tags "with_vless,with_tcp" \
            -trimpath \
            -ldflags "-s -w -buildid=" \
            -o ../../sing-box

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: sing-box
          draft: false
          prerelease: false
          body: |
            ## Sing-box 极致精简版
            
            - **同步官方版本**: `${{ steps.get_tag.outputs.tag }}`
            - **协议裁剪**: 仅保留 `VLESS` + `TCP` (无 `sniffing` 模块)
            - **性能优化**: 针对 64MB 低内存 VPS 深度优化，纯静态链接，剔除所有调试符号表。