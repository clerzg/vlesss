- name: Build Hardcore Minimal
        run: |
          # 确保所有的依赖都已经初始化
          go mod tidy
          # 编译自定义的极简入口
          CGO_ENABLED=0 go build -v -ldflags "-s -w -buildid=" -o sing-box minimal-main.go
          
      - name: Compress
        run: |
          # 使用 --best 模式快速压缩
          upx --best sing-box