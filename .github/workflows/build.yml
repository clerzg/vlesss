name: Build and Release Sing-box Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Initialize Project and Generate Source
        run: |
          # 1. 创建一个全新的干净目录用来编译
          mkdir build-workspace && cd build-workspace
          
          # 2. 初始化全新的 Go 模块
          go mod init sing-box-minimal
          
          # 3. 显式锁定并拉取 sing-box v1.13.13 核心库
          go get github.com/sagernet/sing-box@v1.13.13
          
          # 4. 用 cat 动态生成只包含 VLESS + TCP + HTTP 的最小入口代码
          cat <<EOF > main.go
          package main

          import (
              "github.com/sagernet/sing-box/common/x"
              _ "github.com/sagernet/sing-box/inbound/vless"
              _ "github.com/sagernet/sing-box/transport/tcp"
              _ "github.com/sagernet/sing-box/transport/internet/http"
          )

          func main() {
              x.Run()
          }
          EOF
          
          # 5. 整理依赖，让 Go 自动下载编译 main.go 所需的基础组件
          go mod tidy

      - name: Build Hardcore Minimal
        run: |
          cd build-workspace
          # -s -w 裁剪符号表，-trimpath 隐藏路径，CGO_ENABLED=0 纯静态编译
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -buildid=" -o ../sing-box .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.13.13
          files: sing-box
          draft: false
          prerelease: false
          body: "Hardcore minimal build: VLESS + TCP + HTTP Transport only. Statically linked and compiler optimized."