name: Build and Release Sing-box Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Official Source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: v1.13.13

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Surgical Cut - Remove Unused Protocols
        run: |
          # 1. 进到官方程序真正的入口目录
          cd cmd/sing-box
          
          # 2. 覆盖重写官方的 main.go，强行只注入你需要的协议核心
          cat <<EOF > main.go
          package main

          import (
              "context"
              "github.com/sagernet/sing-box/cmd/sing-box/cmd"
              
              # 仅物理保留并强制注册这三个核心组件，其余全部不引入
              _ "github.com/sagernet/sing-box/inbound/vless"
              _ "github.com/sagernet/sing-box/transport/tcp"
              _ "github.com/sagernet/sing-box/transport/internet/http"
          )

          func main() {
              cmd.ExecuteContext(context.Background())
          }
          EOF

      - name: Build Hardcore Minimal
        run: |
          # 进到修改后的主入口目录编译
          cd cmd/sing-box
          go mod tidy
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -buildid=" -o ../../sing-box .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.13.13
          files: sing-box
          draft: false
          prerelease: false
          body: "Hardcore surgical minimal build: VLESS + TCP + HTTP only. 100% stable dependency chain."